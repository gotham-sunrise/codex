[package]
edition.workspace = true
license.workspace = true
name = "anecdoct-memories-write"
version.workspace = true

[lib]
name = "anecdoct_memories_write"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
anecdoct-backend-client = { workspace = true }
anecdoct-core = { workspace = true }
anecdoct-config = { workspace = true }
anecdoct-features = { workspace = true }
anecdoct-git-utils = { workspace = true }
anecdoct-login = { workspace = true }
anecdoct-otel = { workspace = true }
anecdoct-protocol = { workspace = true }
anecdoct-rollout = { workspace = true }
anecdoct-rollout-trace = { workspace = true }
anecdoct-secrets = { workspace = true }
anecdoct-state = { workspace = true }
anecdoct-terminal-detection = { workspace = true }
anecdoct-utils-absolute-path = { workspace = true }
anecdoct-utils-output-truncation = { workspace = true }
anecdoct-utils-template = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }
uuid = { workspace = true, features = ["v4", "v5"] }

[dev-dependencies]
anecdoct-models-manager = { workspace = true }
core_test_support = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
wiremock = { workspace = true }
