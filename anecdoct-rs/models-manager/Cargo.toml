[package]
edition.workspace = true
license.workspace = true
name = "anecdoct-models-manager"
version.workspace = true

[lib]
doctest = false
name = "anecdoct_models_manager"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
anecdoct-app-server-protocol = { workspace = true }
anecdoct-collaboration-mode-templates = { workspace = true }
anecdoct-login = { workspace = true }
anecdoct-otel = { workspace = true }
anecdoct-protocol = { workspace = true }
anecdoct-utils-output-truncation = { workspace = true }
anecdoct-utils-template = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
