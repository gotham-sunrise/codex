[package]
edition.workspace = true
license.workspace = true
name = "anecdoct-memories-extension"
version.workspace = true

[lib]
name = "anecdoct_memories_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
anecdoct-core = { workspace = true }
anecdoct-extension-api = { workspace = true }
anecdoct-features = { workspace = true }
anecdoct-memories-read = { workspace = true }
anecdoct-tools = { workspace = true }
anecdoct-utils-absolute-path = { workspace = true }
anecdoct-utils-output-truncation = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
